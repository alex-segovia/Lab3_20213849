<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gestión de pacientes | Editar pacientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid d-flex justify-content-center mt-5">
  <div class="container w-50 d-flex justify-content-around">
    <a th:href="@{'/clinica'}"><button class="btn btn-primary">Clínicas</button></a>
    <a th:href="@{'/oftalmologo'}"><button class="btn btn-primary">Oftalmólogos</button></a>
    <a th:href="@{'/paciente'}"><button class="btn btn-primary">Pacientes</button></a>
  </div>
</div>
<div class="container mt-5">
  <h2 class="mb-4">Editar paciente</h2>
  <form method="post" th:action="@{'/paciente/guardar'}">
    <input th:value="${paciente.getId()}" name="id" type="hidden">
    <div class="form-group mb-4">
      <label for="nombre">Nombre</label>
      <input th:value="${paciente.getNombre()}" name="nombre" id="nombre" type="text" class="form-control" disabled>
    </div>
    <div class="form-group mb-4">
      <label for="edad">Edad</label>
      <input th:value="${paciente.getEdad()}" name="edad" id="edad" type="text" class="form-control" disabled>
    </div>
    <div class="form-group mb-4">
      <label for="genero">Género</label>
      <input th:value="${paciente.getGenero()}" name="genero" id="genero" type="text" class="form-control" disabled>
    </div>
    <div class="form-group mb-4">
      <label for="diagnostico">Diagnostico</label>
      <input th:value="${paciente.getDiagnostico()}" name="diagnostico" id="diagnostico" type="text" class="form-control" disabled>
    </div>
    <div class="form-group mb-4">
      <label for="fechaCita">Fecha de cita</label>
      <input th:value="${paciente.getFechaCita()}" name="fechaCita" id="fechaCita" type="text" class="form-control" disabled>
    </div>
    <div class="form-group mb-4">
      <label for="numeroHabitacion">Número de habitación</label>
      <input th:value="${paciente.getNumeroHabitacion()}" name="numeroHabitacion" id="numeroHabitacion" type="text" class="form-control">
    </div>
    <div class="form-group mb-4">
      <label for="oftalmologo">Oftalmólogo</label>
      <input th:value="${paciente.getOftalmologo().getNombre()}" name="oftalmologo" type="text" id="oftalmologo" class="form-control" disabled>
    </div>
    <div class="form-group mb-4">
      <label for="clinica">Clínica</label>
      <input th:value="${paciente.getClinica().getNombre()}" name="clinica" id="clinica" type="text" class="form-control" disabled>
    </div>
    <a th:href="@{'/paciente'}" class="btn btn-danger">Cancelar</a>
    <button type="submit" class="btn btn-primary">Editar</button>
  </form>
</div>
</body>
</html>
