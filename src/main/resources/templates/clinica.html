<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de clínicas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
  <div class="container-fluid d-flex justify-content-center mt-5">
    <div class="container w-50 d-flex justify-content-around">
      <a th:href="@{'/clinica'}"><button class="btn btn-primary">Clínicas</button></a>
      <a th:href="@{'/oftalmologo'}"><button class="btn btn-primary">Oftalmólogos</button></a>
      <a th:href="@{'/paciente'}"><button class="btn btn-primary">Pacientes</button></a>
    </div>
  </div>
  <div class="container mt-5">
      <h2>Lista de clínicas</h2>
      <table class="table table-sm">
          <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Dirección</th>
              <th>Teléfono</th>
              <th></th>
              <th></th>
          </tr>
          <tr th:each="clinica,info: ${listaClinicas}">
              <td th:text="${info.index + 1}"></td>
              <td th:text="${clinica.getNombre()}"></td>
              <td th:text="${clinica.getDireccion()}"></td>
              <td th:text="${clinica.getTelefono()}"></td>
              <td><a class="btn btn-primary" th:href="@{'/clinica/mostrarOftalmologos'+'?id='+${clinica.getId()}}">Mostrar Oftalmólogos</a></td>
              <td><a class="btn btn-primary" th:href="@{'/clinica/mostrarPacientes'+'?id='+${clinica.getId()}}">Mostrar Pacientes</a></td>
          </tr>
      </table>
  </div>
</body>
</html>
