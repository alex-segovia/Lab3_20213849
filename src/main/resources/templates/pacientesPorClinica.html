<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de clínicas | Pacientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
  <div class="container-fluid d-flex justify-content-center mt-5">
    <div class="container w-50 d-flex justify-content-around">
      <a th:href="@{'/clinica'}"><button class="btn btn-primary">Clínicas</button></a>
      <a th:href="@{'/oftalmologo'}"><button class="btn btn-primary">Oftalmólogos</button></a>
      <a th:href="@{'/paciente'}"><button class="btn btn-primary">Pacientes</button></a>
    </div>
  </div>
  <div class="container mt-5">
      <h2>Lista de pacientes de <span th:text="${clinicaActual.getNombre()}"></span></h2>
      <table class="table table-sm">
          <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Edad</th>
              <th>Género</th>
              <th>Diagnóstico</th>
              <th>Fecha de cita</th>
              <th>Número de habitación</th>
              <th>Oftalmólogo</th>
              <th>Clínica</th>
          </tr>
          <tr th:each="paciente,info: ${listaPacientes}">
              <td th:text="${info.index + 1}"></td>
              <td th:text="${paciente.getNombre()}"></td>
              <td th:text="${paciente.getEdad()}"></td>
              <td th:text="${paciente.getGenero()}"></td>
              <td th:text="${paciente.getDiagnostico()}"></td>
              <td th:text="${paciente.getFechaCita()}"></td>
              <td th:text="${paciente.getNumeroHabitacion()}"></td>
              <td th:text="${paciente.getOftalmologo().getNombre()}"></td>
              <td th:text="${paciente.getClinica().getNombre()}"></td>
          </tr>
      </table>
  </div>
</body>
</html>
